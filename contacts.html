<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — Pink Puff Club</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    :root {
      --primary: #FF8AAE;
      --light-pink: #FFD1DC;
      --bg: #FFF0F5;
      --text: #333;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding-top: 4rem;
    }

    .section {
      padding: 5rem 1.5rem !important;
    }

    .input, .textarea, .select select, .button {
      border-radius: 1.2rem !important;
      border: 2px solid var(--light-pink);
    }

    .button.is-primary {
      background-color: var(--primary);
      border: none;
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(255, 138, 174, 0.3);
      transition: all 0.2s ease;
    }

    .button.is-primary:hover {
      background-color: #FF6B9D;
      transform: scale(1.03);
    }

    .button.is-primary:active {
      transform: scale(0.98);
    }

    .field {
      margin-bottom: 1.5rem;
    }

    .label {
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .content p {
      margin-bottom: 0.8rem;
      font-size: 1.1rem;
    }

    .title.is-4 {
      color: var(--primary);
      margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>

  <section class="section">
    <div class="container">
      <h1 class="title is-2" style="color: var(--primary); text-align: center; margin-bottom: 3rem;">
        Связаться с нами 💕
      </h1>

      <div class="columns is-centered">
        <div class="column is-6">
          <!-- Добавляем ID к форме -->
          <form id="contactForm">
            <div class="field">
              <label class="label">Имя<span class="has-text-danger">*</span></label>
              <input class="input" type="text" id="name" required>
            </div>

            <div class="field">
              <label class="label">Email<span class="has-text-danger">*</span></label>
              <input class="input" type="email" id="email" required>
            </div>

            <div class="field">
              <label class="label">Тема<span class="has-text-danger">*</span></label>
              <div class="select is-fullwidth">
                <select id="subject" required>
                  <option value="">Выберите тему</option>
                  <option value="question">Вопрос</option>
                  <option value="feedback">Отзыв</option>
                  <option value="booking">Запись на тренировку</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label class="label">Сообщение</label>
              <textarea class="textarea" id="message" rows="4"></textarea>
            </div>

            <div class="field">
              <label class="checkbox">
                <input type="checkbox" id="agreement" required>
                Согласен на обработку данных
              </label>
            </div>

            <button class="button is-primary" type="submit">Отправить</button>
          </form>
        </div>

        <div class="column is-6 content">
          <h3 class="title is-4">Контакты</h3>
          <p>📍 ул. Спортивная, 15</p>
          <p>✉️ <a href="mailto:pinkypie@yahoo.com" style="color: var(--text); text-decoration: none;">pinkypie@yahoo.com</a></p>
          <p>
            <a href="https://t.me/slattarchives" style="color: var(--text); text-decoration: none;">
              <i class="fab fa-telegram"></i> Написать в Telegram
            </a>
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- Подключение скриптов -->
  <script src="scripts/validation.js"></script>
  <script src="scripts/consoleLogger.js"></script>
</body>
</html>
