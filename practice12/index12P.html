<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Практика DOM — Pink Puff Club</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #FFF0F5;
      color: #333;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .section {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(255, 138, 174, 0.2);
      transition: background-color 0.3s ease;
    }
    .section h2 {
      color: #FF8AAE;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #FFD1DC;
      padding-bottom: 0.5rem;
    }
    button {
      background-color: #FF8AAE;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
      margin-right: 0.5rem;
    }
    button:hover {
      background-color: #FF6B9D;
      transform: scale(1.05);
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      background: #FFF0F5;
      border-radius: 0.8rem;
      animation: popIn 0.3s ease-out;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    input[type="text"] {
      padding: 0.75rem;
      border: 2px solid #FFD1DC;
      border-radius: 1rem;
      margin-right: 0.5rem;
      font-size: 1rem;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #FF8AAE;
      box-shadow: 0 0 0 3px rgba(255, 138, 174, 0.2);
    }
    .switcher {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background: #FF8AAE;
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      margin-left: 1rem;
    }
    .switcher:hover {
      transform: scale(1.1);
      background: #FF6B9D;
    }
    .box {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #FF8AAE, #FFD1DC);
      border-radius: 1rem;
      margin: 1rem 0;
      transition: width 0.2s ease, height 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #E3F2FD;
      border-radius: 1rem;
      font-weight: bold;
    }
    
    /* 🌙 Тёмная тема */
    body.dark {
      background-color: #1a1a2e;
      color: #f0f0f0;
    }
    body.dark .section {
      background: #241c21;
      box-shadow: 0 4px 12px rgba(255, 138, 174, 0.4);
    }
    body.dark .section h2 {
      color: #FFB6C1;
      border-bottom-color: #FF6B9D;
    }
    body.dark li {
      background: #181416;
    }
    body.dark input[type="text"] {
      background: #181416;
      color: #f0f0f0;
      border-color: #FF6B9D;
    }
  </style>
</head>
<body>

  <!-- Задание 1: Счётчик кликов -->
  <section class="section" id="task1">
    <h2>Задание №1: Счётчик кликов</h2>
    <p id="counter" style="font-size: 2rem; font-weight: bold; color: #FF8AAE;">0</p>
    <button id="addUserBtn">Увеличить счётчик</button>
  </section>

  <!-- Задание 2: Приветствие -->
  <section class="section" id="task2">
    <h2>Задание №2: Приветствие</h2>
    <div>
      <input type="text" id="nameInput" placeholder="Введите имя">
      <button id="hiUserBtn">Привет</button>
    </div>
    <ul id="greetingList" style="margin-top: 1rem;"></ul>
  </section>

  <!-- Задание 3: Переключатель темы -->
  <section class="section" id="task3">
    <h2>Задание №3: Переключатель темы</h2>
    <button id="themeUserBtn">Сменить тему</button>
    <a class="switcher" id="themeToggle">🌙</a>
  </section>

  <!-- Задание 4: Список дел -->
  <section class="section" id="task4">
    <h2>Задание №4: Список дел</h2>
    <div>
      <input type="text" id="todoInput" placeholder="Что нужно сделать?">
      <button id="addTodoBtn">Добавить</button>
    </div>
    <ul id="todoList" style="margin-top: 1rem;"></ul>
  </section>

  <!-- Задание 5: Управление размером -->
  <section class="section" id="task5">
    <h2>Задание №5: Управление размером</h2>
    <div>
      <button id="decreaseBtn">−</button>
      <button id="increaseBtn">+</button>
    </div>
    <div id="sizeBox" class="box">100px</div>
  </section>

  <script src="script.js"></script>
</body>
</html>
