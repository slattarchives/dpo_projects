<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Практика DOM — Pink Puff Club</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #FFF0F5;
      color: #333;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .section {
      background: white;
      border-radius: 1.5rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 12px rgba(255, 138, 174, 0.2);
    }
    .section h2 {
      color: #FF8AAE;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #FFD1DC;
      padding-bottom: 0.5rem;
    }
    .border-container {
      border: 2px solid #333;
      padding: 1.5rem;
      border-radius: 1rem;
      margin-top: 1rem;
    }
    .bg-green {
      background-color: lightgreen;
      padding: 0.5rem;
      border-radius: 0.5rem;
    }
    .red-text {
      color: red;
      font-weight: bold;
    }
    .highlight {
      background-color: #FFF9C4;
      padding: 0.5rem;
      border-radius: 0.5rem;
      font-weight: bold;
    }
    button {
      background-color: #FF8AAE;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 1rem;
    }
    button:hover {
      background-color: #FF6B9D;
      transform: scale(1.05);
    }
    ul {
      list-style-type: none;
      padding-left: 0;
    }
    li {
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      background: #FFF0F5;
      border-radius: 0.8rem;
    }
    .item {
      padding: 0.8rem;
      margin: 0.5rem 0;
      background: #F8F8F8;
      border-radius: 0.8rem;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #E3F2FD;
      border-radius: 1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Задание 1: Счётчик кликов -->
  <section class="section" id="task1">
    <h2>Задание №1: Счётчик кликов</h2>
    <div id="containeR"></div>
    <button id="addUserBtn">Увеличить счетчик</button>
  </section>

  <!-- Задание 2: Работа с селекторами -->
  <section class="section" id="task2">
    <h2>Задание №2: Работа с селекторами</h2>
    <div id="container">
      <p class="text">Первый параграф</p>
      <p class="text special">Второй параграф</p>
      <p class="text">Третий параграф</p>
      <p class="text">Четвёртый параграф</p>
    </div>
  </section>

  <!-- Задание 3: Data-атрибуты и вычисления -->
  <section class="section" id="task3">
    <h2>Задание №3: Data-атрибуты и вычисления</h2>
    <div class="item" data-price="100">Товар 1</div>
    <div class="item active" data-price="200">Товар 2</div>
    <div class="item" data-price="150">Товар 3</div>
    <div class="result" id="calcResult"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
